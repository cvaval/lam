name: CI

# Vérifie chaque envoi : types, lint et build (le build attrape les erreurs de routes/imports
# que tsc seul rate — origine du bug « 2FA récurrent » sur build périmé). Audit 2 juil. 2026.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lam_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lam_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/lam_ci
      # Secret factice : présent pour satisfaire le fail-fast de production au build.
      TRUSTED_DEVICE_SECRET: ci-dummy-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
